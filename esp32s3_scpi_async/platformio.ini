[env:esp32s3_n8r2]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
upload_speed = 921600

; ESP32-S3 N8R2: 8 MB Flash + 2 MB PSRAM
board_build.arduino.memory_type = qio_qspi
board_build.flash_mode = qio
board_build.psram_type = qio
board_upload.flash_size = 8MB
board_upload.maximum_size = 8388608
board_build.partitions = default_8MB.csv

build_flags =
  -DBOARD_HAS_PSRAM
  ; Use UART0/USB-UART bridge for Serial Monitor output on the same COM port
  ; where ESP-ROM boot log is visible.
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=0

; Offline/local-library mode.
; All project libraries must be placed inside esp32s3_scpi_async/lib/.
; This keeps PlatformIO from downloading library dependencies during normal build.
lib_extra_dirs = lib
lib_ldf_mode = chain+

; Do not use lib_deps in the main env. Keep it empty/disabled so nothing is downloaded.
; Required local folders in lib/:
;   lib/Ethernet
;   lib/Adafruit MCP23017 Arduino Library
;   lib/Adafruit SSD1306
;   lib/Adafruit GFX Library
;   lib/Adafruit BusIO
; Optional only if you return to Vrekrer parser experiments:
;   lib/Vrekrer SCPI parser
; lib_deps =

[env:esp32s3_n8r2_fetch_libs]
extends = env:esp32s3_n8r2
; This environment is only for one-time library downloading.
; Use it only when lib/ is empty and .pio/libdeps does not exist:
;   pio run -e esp32s3_n8r2_fetch_libs
;   tools\vendor_libs.cmd
; After libraries are copied to lib/, build the normal env:
;   pio run -e esp32s3_n8r2
lib_deps =
  Vrekrer/Vrekrer SCPI parser@^0.5.0
  arduino-libraries/Ethernet@^2.0.2
  adafruit/Adafruit MCP23017 Arduino Library@^2.3.2
  adafruit/Adafruit SSD1306@^2.5.13
  adafruit/Adafruit GFX Library@^1.12.1
